title: Merit vs Recognition
slug: merit-vs-recognition
summary: Merit and recognition are not the same thing. One concerns actual contribution and structural significance, while the other concerns whether institutions choose to validate that contribution publicly.
definition: Merit refers to the intrinsic or structural value of a contribution. Recognition refers to the visibility, validation, and status granted to that contribution by an external system.
explanation: The distance between merit and recognition is one of the central problems ChampionsAwards is built to measure. Some systems reduce this gap. Others institutionalize it.
implications: A credible evaluative framework must distinguish between what deserves to be recognized and what happened to receive recognition.
