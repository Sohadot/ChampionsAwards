title: Recognition Bias
slug: recognition-bias
summary: Recognition bias describes the structural tendency of institutions, prize systems, and public narratives to reward visibility, proximity, and power more consistently than true significance.
definition: Recognition bias is the distortion that occurs when systems of prestige favor certain actors, regions, narratives, or institutions independently of the full merit or structural impact of the work being recognized.
explanation: It emerges through historical asymmetries, geopolitical centrality, institutional gatekeeping, media amplification, and symbolic inheritance. Once established, it tends to reproduce itself by making already-visible actors appear naturally deserving.
implications: Without understanding recognition bias, societies risk confusing fame with merit, publicity with contribution, and repetition with legitimacy.
