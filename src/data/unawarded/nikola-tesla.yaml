title: Nikola Tesla
slug: nikola-tesla
summary: Nikola Tesla stands as one of the most cited examples of a figure whose long-term civilizational influence exceeded the recognition architecture available to him during his lifetime.
introduction: Tesla’s work shaped electrical modernity at a structural level, yet his public recognition fluctuated dramatically and often failed to match the scale of his technical and conceptual impact.
omission_case: His case matters because it captures the difference between invention, commercial visibility, institutional endorsement, and historical afterlife.
structural_reason: Recognition systems often favor actors who align with prevailing institutions of capital, narrative, and consolidation. Tesla’s position within that structure remained unstable.
